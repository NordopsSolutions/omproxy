[server]
listen_addr = "0.0.0.0:8080"
read_timeout = "10s"
write_timeout = "30s"
shutdown_timeout = "10s"

[open_meteo]
base_url = "https://api.open-meteo.com/v1/forecast"
timezone = "Europe/Bucharest"
forecast_days = 7
request_timeout = "20s"

[cache]
ttl = "1h"
coordinate_precision = 4

[database]
host = "127.0.0.1"
port = 5432
name = "weather"
user = "weather"
password = "weather_dev"
sslmode = "disable"
max_open_conns = 10
max_idle_conns = 5
conn_max_lifetime = "30m"

[metrics]
hourly = [
  "temperature_2m",
  "relative_humidity_2m",
  "precipitation_probability",
  "precipitation",
  "weather_code",
  "wind_speed_10m",
  "wind_gusts_10m",
  "wind_direction_10m",
  "pressure_msl",
  "et0_fao_evapotranspiration",
  "vapour_pressure_deficit",
  "soil_temperature_6cm",
  "soil_moisture_1_to_3cm",
  "shortwave_radiation"
]

daily = [
  "weather_code",
  "temperature_2m_max",
  "temperature_2m_min",
  "precipitation_sum",
  "precipitation_probability_max",
  "wind_speed_10m_max",
  "wind_gusts_10m_max",
  "et0_fao_evapotranspiration",
  "shortwave_radiation_sum"
]
